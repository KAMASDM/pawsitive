[build]
  command = "node scripts/generate-firebase-sw.js && npm run build"
  publish = "build"

# Firebase API keys are client-side identifiers (not secrets) — security is
# enforced by Firebase Security Rules and domain restrictions, not by keeping
# the key hidden. The compiled Vite bundle always contains the value of
# VITE_FIREBASE_API_KEY; tell Netlify's scanner to allow it.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Note: Scheduled functions need to be configured via Netlify UI or API
# Schedule: 30 3 * * * (3:30 AM UTC = 9:00 AM IST daily)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
